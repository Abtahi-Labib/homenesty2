<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — HomeNesty</title>
    <link rel="stylesheet" href="/src/index.css">
</head>
<body class="bg-[#fefdfb]">
    <div class="min-h-[90vh] flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full bg-white p-10 rounded-3xl border border-stone-100 shadow-sm">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-serif mb-2 tracking-tight">Welcome Back</h1>
                <p class="text-stone-500 font-sans text-sm tracking-wide">Continue your journey with HomeNesty</p>
            </div>

            <div id="error-box" class="hidden mb-6 p-4 bg-red-50 text-red-600 text-sm rounded-xl font-sans flex items-center">
                <span class="w-1 h-1 bg-red-600 rounded-full mr-3"></span>
                <span id="error-message"></span>
            </div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="text-xs font-bold uppercase tracking-widest text-stone-400 mb-2 block font-sans">Email Address</label>
                    <div class="relative">
                        <input type="email" id="email" required class="w-full bg-stone-50 border border-stone-100 rounded-xl px-4 py-3.5 outline-none focus:ring-1 focus:ring-stone-900 focus:bg-white font-sans text-sm" placeholder="you@example.com">
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold uppercase tracking-widest text-stone-400 mb-2 block font-sans">Password</label>
                    <div class="relative">
                        <input type="password" id="password" required class="w-full bg-stone-50 border border-stone-100 rounded-xl px-4 py-3.5 outline-none focus:ring-1 focus:ring-stone-900 focus:bg-white font-sans text-sm" placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-stone-900 text-white py-4 rounded-xl font-semibold uppercase tracking-widest text-sm hover:bg-stone-800 transition-all shadow-lg flex items-center justify-center">
                    Sign In
                </button>
            </form>

            <div class="mt-10 pt-8 border-t border-stone-100 text-center">
                <p class="text-sm text-stone-500 font-sans tracking-wide">
                    Don't have an account? <a href="/register.html" class="text-stone-900 font-bold hover:text-amber-700 transition-colors ml-1">Join HomeNesty</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module" src="/src/login.js"></script>
</body>
</html>
