<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeNesty — House Rental Management</title>
    <link rel="stylesheet" href="/src/index.css">
</head>
<body class="bg-[#fefdfb]">
    <!-- Hero Section -->
    <section class="relative h-[85vh] flex items-center justify-center overflow-hidden bg-stone-900">
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1600585154340-be6199f7d009?auto=format&fit=crop&q=80&w=2000" alt="Hero background" class="w-full h-full object-cover opacity-60 scale-105">
            <div class="absolute inset-0 bg-gradient-to-b from-stone-900/40 via-stone-900/20 to-stone-900/60"></div>
        </div>
        <div class="relative z-10 max-w-7xl mx-auto px-4 text-center">
            <h1 class="text-5xl md:text-7xl font-serif text-white mb-6 tracking-tight">
                Home is where your <br> <span class="italic font-normal">story begins.</span>
            </h1>
            <p class="text-lg md:text-xl text-stone-200 mb-10 max-w-2xl mx-auto font-sans leading-relaxed font-light">
                HomeNesty connects you directly with verified landlords. No middlemen, no hidden fees, just your next home.
            </p>
            <div class="max-w-3xl mx-auto bg-white/10 backdrop-blur-xl p-2 rounded-2xl border border-white/20 shadow-2xl">
                <div class="flex flex-col md:flex-row items-center gap-2">
                    <div class="flex-1 w-full bg-white rounded-xl flex items-center px-4 py-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-stone-400 mr-3"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        <input type="text" placeholder="Where are you looking for?" class="w-full outline-none text-stone-900 bg-transparent text-sm placeholder-stone-400 font-sans">
                    </div>
                    <a href="/explore.html" class="w-full md:w-auto bg-stone-900 text-white px-8 py-4 rounded-xl text-sm font-semibold hover:bg-stone-800 transition-all uppercase tracking-widest text-center">Search</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Why Choose Us -->
    <section class="py-24 bg-stone-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-20 items-center">
                <div>
                    <span class="text-xs font-bold uppercase tracking-widest text-amber-600 mb-3 block">Why HomeNesty</span>
                    <h2 class="text-4xl md:text-5xl font-serif mb-8 tracking-tight">A better way to find <br>your next living space.</h2>
                    <div class="space-y-10">
                        <div class="flex space-x-6">
                            <div class="flex-shrink-0 w-12 h-12 rounded-full bg-amber-50 flex items-center justify-center text-amber-600">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                            </div>
                            <div>
                                <h4 class="text-lg font-serif mb-2">Verified Information</h4>
                                <p class="text-sm text-stone-500 font-sans">Every listing is verified by our team.</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="rounded-3xl overflow-hidden shadow-2xl">
                    <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&q=80&w=1200" class="w-full h-full object-cover">
                </div>
            </div>
        </div>
    </section>

    <script type="module">
        import { injectNavbar, injectFooter } from '/src/components.js';
        injectNavbar();
        injectFooter();
    </script>
</body>
</html>
