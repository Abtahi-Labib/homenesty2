<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Homes — HomeNesty</title>
    <link rel="stylesheet" href="/src/index.css">
</head>
<body class="bg-[#fcfdfe]">
    <div class="min-h-screen pt-12 pb-24">
        <div class="max-w-7xl mx-auto px-4">
            <header class="mb-16">
                <span class="text-xs font-bold uppercase tracking-[0.3em] text-luxury-gold mb-4 block font-sans">Curated Registry</span>
                <h1 class="text-6xl md:text-7xl font-serif tracking-tight text-primary-navy mb-10">Discover your <br><span class="italic font-normal">sanctuary.</span></h1>
                
                <div class="flex flex-col lg:flex-row gap-8 items-start lg:items-center">
                    <div class="relative w-full lg:max-w-md bg-white border border-slate-100 rounded-2xl p-1 shadow-sm flex items-center transition-all focus-within:shadow-xl focus-within:shadow-slate-200/50">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400 mx-5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        <input type="text" id="search-input" placeholder="Search premier locations..." class="w-full py-4 text-sm font-sans outline-none text-slate-900 placeholder-slate-400 tracking-wide">
                    </div>
                    
                    <div id="category-filters" class="flex flex-wrap gap-3">
                        <button data-cat="all" class="cat-btn px-8 py-3 rounded-full text-[10px] font-bold uppercase tracking-[0.2em] transition-all bg-primary-navy text-white shadow-lg shadow-primary-navy/20">All Collections</button>
                        <button data-cat="family" class="cat-btn px-8 py-3 rounded-full text-[10px] font-bold uppercase tracking-[0.2em] transition-all bg-white border border-slate-100 text-slate-500 hover:border-primary-navy">Family Estates</button>
                        <button data-cat="student" class="cat-btn px-8 py-3 rounded-full text-[10px] font-bold uppercase tracking-[0.2em] transition-all bg-white border border-slate-100 text-slate-500 hover:border-primary-navy">Student Studios</button>
                        <button data-cat="bachelor" class="cat-btn px-8 py-3 rounded-full text-[10px] font-bold uppercase tracking-[0.2em] transition-all bg-white border border-slate-100 text-slate-500 hover:border-primary-navy">Professional Suites</button>
                        <button data-cat="hotel" class="cat-btn px-8 py-3 rounded-full text-[10px] font-bold uppercase tracking-[0.2em] transition-all bg-white border border-slate-100 text-slate-500 hover:border-primary-navy">Vacation & Hotels</button>
                    </div>
                </div>
            </header>

            <div id="property-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
                <!-- Properties will be injected here -->
            </div>
            
            <div id="loading-state" class="hidden flex flex-col items-center justify-center py-32">
                <div class="w-12 h-12 border-2 border-primary-navy/10 border-t-primary-navy rounded-full animate-spin mb-6"></div>
                <p class="text-slate-400 font-serif text-xl italic tracking-tight">Syncing with our global registry...</p>
            </div>

            <div id="empty-state" class="hidden text-center py-40 bg-slate-50 rounded-[3rem] border border-slate-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mx-auto text-slate-300 mb-6"><path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/><path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"/></svg>
                <p class="text-slate-500 font-serif text-2xl">No matching properties found.</p>
                <p class="text-slate-400 text-sm mt-2 font-sans">Try adjusting your search criteria.</p>
            </div>
        </div>
    </div>

    <script type="module" src="/src/explore.js"></script>
</body>
</html>
