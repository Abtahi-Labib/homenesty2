<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Homes — HomeNesty</title>
    <link rel="stylesheet" href="/src/index.css">
</head>
<body class="bg-[#fefdfb]">
    <div class="min-h-screen pt-12 pb-24">
        <div class="max-w-7xl mx-auto px-4">
            <header class="mb-16">
                <span class="text-xs font-bold uppercase tracking-[0.2em] text-amber-600 mb-4 block font-sans">Discovery</span>
                <h1 class="text-5xl md:text-6xl font-serif tracking-tight text-stone-900 mb-8">Find your next space.</h1>
                
                <div class="flex flex-col lg:flex-row gap-6 items-start lg:items-center">
                    <div class="relative w-full lg:max-w-md bg-white border border-stone-100 rounded-2xl p-1 shadow-sm flex items-center transition-all focus-within:shadow-xl focus-within:shadow-stone-200/50">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-stone-400 mx-4"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        <input type="text" id="search-input" placeholder="Search by area or title..." class="w-full py-4 text-sm font-sans outline-none text-stone-900 placeholder-stone-400">
                    </div>
                    
                    <div id="category-filters" class="flex flex-wrap gap-2">
                        <button data-cat="all" class="cat-btn px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest transition-all bg-stone-900 text-white">All Homes</button>
                        <button data-cat="family" class="cat-btn px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest transition-all bg-white border border-stone-100 text-stone-500 hover:border-stone-300">Family</button>
                        <button data-cat="student" class="cat-btn px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest transition-all bg-white border border-stone-100 text-stone-500 hover:border-stone-300">Student</button>
                        <button data-cat="bachelor" class="cat-btn px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest transition-all bg-white border border-stone-100 text-stone-500 hover:border-stone-300">Bachelor</button>
                    </div>
                </div>
            </header>

            <div id="property-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <!-- Properties will be injected here -->
            </div>
            
            <div id="loading-state" class="hidden flex flex-col items-center justify-center py-20">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="animate-spin text-stone-400 mb-4"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                <p class="text-stone-400 font-serif text-lg italic">Searching the registry...</p>
            </div>

            <div id="empty-state" class="hidden text-center py-32 bg-stone-50 rounded-3xl border border-stone-100 italic">
                <p class="text-stone-500 font-serif text-xl text-center">No properties found.</p>
            </div>
        </div>
    </div>

    <script type="module" src="/src/explore.js"></script>
</body>
</html>
