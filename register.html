<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join — HomeNesty</title>
    <link rel="stylesheet" href="/src/index.css">
</head>
<body class="bg-[#fcfdfe]">
    <div class="min-h-[90vh] flex items-center justify-center px-4 py-20">
        <div class="max-w-2xl w-full bg-white p-10 rounded-3xl border border-slate-100 shadow-xl shadow-slate-200/50">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-serif mb-2 tracking-tight text-primary-navy">Create Account</h1>
                <p class="text-slate-500 font-sans text-sm tracking-wide">Join our community and find your next home</p>
            </div>

            <div id="error-box" class="hidden mb-6 p-4 bg-red-50 text-red-600 text-sm rounded-xl font-sans flex items-center">
                <span class="w-1 h-1 bg-red-600 rounded-full mr-3"></span>
                <span id="error-message"></span>
            </div>

            <form id="register-form" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 block font-sans">Full Name</label>
                        <input type="text" id="full_name" required class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3.5 outline-none focus:ring-1 focus:ring-primary-navy text-sm font-sans" placeholder="John Doe">
                    </div>
                    <div>
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 block font-sans">Phone Number</label>
                        <input type="tel" id="phone" required class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3.5 outline-none focus:ring-1 focus:ring-primary-navy text-sm font-sans" placeholder="+880 1XXX-XXXXXX">
                    </div>
                    <div>
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 block font-sans">Email Address</label>
                        <input type="email" id="email" required class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3.5 outline-none focus:ring-1 focus:ring-primary-navy text-sm font-sans" placeholder="you@example.com">
                    </div>
                    <div>
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 block font-sans">Password</label>
                        <input type="password" id="password" required minlength="6" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3.5 outline-none focus:ring-1 focus:ring-primary-navy text-sm font-sans" placeholder="••••••••">
                    </div>
                </div>

                <div class="space-y-4">
                    <label class="text-xs font-bold uppercase tracking-widest text-slate-400 block font-sans text-center">I am a...</label>
                    <div class="grid grid-cols-2 gap-4 max-w-sm mx-auto">
                        <label class="cursor-pointer">
                            <input type="radio" name="role" value="tenant" checked class="peer hidden">
                            <div class="flex flex-col items-center justify-center p-6 rounded-2xl border-2 transition-all space-y-3 border-slate-100 text-slate-500 peer-checked:border-primary-navy peer-checked:bg-primary-navy peer-checked:text-white">
                                <span class="text-sm font-bold uppercase tracking-wider">Tenant</span>
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="role" value="landlord" class="peer hidden">
                            <div class="flex flex-col items-center justify-center p-6 rounded-2xl border-2 transition-all space-y-3 border-slate-100 text-slate-500 peer-checked:border-primary-navy peer-checked:bg-primary-navy peer-checked:text-white">
                                <span class="text-sm font-bold uppercase tracking-wider">Landlord</span>
                            </div>
                        </label>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="w-full btn-luxury py-4">
                    Create Account
                </button>
            </form>

            <div class="mt-10 pt-8 border-t border-slate-100 text-center">
                <p class="text-sm text-slate-500 font-sans tracking-wide">
                    Already have an account? <a href="/login.html" class="text-primary-navy font-bold hover:text-luxury-gold transition-colors ml-1">Sign In</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module" src="/src/register.js"></script>
</body>
</html>
