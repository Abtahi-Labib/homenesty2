<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — HomeNesty</title>
    <link rel="stylesheet" href="/src/index.css">
</head>
<body class="bg-stone-50">
    <div class="min-h-screen py-12 md:py-24">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
                <div>
                    <span class="text-xs font-bold uppercase tracking-[0.2em] text-amber-600 mb-2 block font-sans">Account</span>
                    <h1 class="text-4xl font-serif tracking-tight text-stone-900" id="welcome-msg">Welcome</h1>
                    <p class="text-stone-500 font-sans text-sm mt-1">Manage your rental listings and preferences</p>
                </div>
                <button id="open-modal-btn" class="hidden bg-stone-900 text-white px-8 py-4 rounded-xl text-sm font-bold uppercase tracking-widest hover:bg-stone-800 transition-all flex items-center shadow-lg shadow-stone-200">
                    Add Property
                </button>
            </div>

            <div id="listings-section" class="space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-serif text-stone-900" id="listings-title">My Listings</h2>
                </div>
                <div id="properties-list" class="grid grid-cols-1 gap-4">
                    <!-- Listings will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="property-modal" class="hidden fixed inset-0 z-[60] bg-stone-900/60 backdrop-blur-sm p-4 flex items-center justify-center">
        <div class="bg-white rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-y-auto p-8 md:p-12 shadow-2xl relative">
            <button id="close-modal-btn" class="absolute top-6 right-6 text-stone-400 hover:text-stone-900 p-2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
            <div class="mb-10">
                <span class="text-xs font-bold uppercase tracking-[0.2em] text-amber-600 mb-2 block">Create Listing</span>
                <h2 class="text-3xl font-serif tracking-tight text-stone-900">Add New Property</h2>
            </div>
            <form id="property-form" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-6">
                    <input type="text" id="p-title" required placeholder="Property Title" class="w-full bg-stone-50 border border-stone-100 rounded-xl px-4 py-3 outline-none text-sm font-sans">
                    <input type="text" id="p-location" required placeholder="Location" class="w-full bg-stone-50 border border-stone-100 rounded-xl px-4 py-3 outline-none text-sm font-sans">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="p-rent" required placeholder="Monthly Rent" class="w-full bg-stone-50 border border-stone-100 rounded-xl px-4 py-3 outline-none text-sm font-sans">
                        <input type="number" id="p-rooms" required placeholder="Rooms" class="w-full bg-stone-50 border border-stone-100 rounded-xl px-4 py-3 outline-none text-sm font-sans">
                    </div>
                    <select id="p-category" class="w-full bg-stone-50 border border-stone-100 rounded-xl px-4 py-3 outline-none text-sm font-sans">
                        <option value="family">Family</option>
                        <option value="student">Student</option>
                        <option value="bachelor">Bachelor</option>
                    </select>
                </div>
                <div class="space-y-6">
                    <textarea id="p-desc" required rows="4" placeholder="Description" class="w-full bg-stone-50 border border-stone-100 rounded-xl px-4 py-3 outline-none text-sm font-sans resize-none"></textarea>
                    <input type="url" id="p-image" placeholder="Image URL (Unsplash)" class="w-full bg-stone-50 border border-stone-100 rounded-xl px-4 py-3 outline-none text-sm font-sans">
                    <input type="url" id="p-map" placeholder="Google Maps Link" class="w-full bg-stone-50 border border-stone-100 rounded-xl px-4 py-3 outline-none text-sm font-sans">
                </div>
                <button type="submit" id="p-submit" class="md:col-span-2 bg-stone-900 text-white py-5 rounded-2xl font-bold uppercase tracking-widest text-sm hover:bg-stone-800 transition-all">Submit Listing</button>
            </form>
        </div>
    </div>

    <script type="module" src="/src/dashboard.js"></script>
</body>
</html>
