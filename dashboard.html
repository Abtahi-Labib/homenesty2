<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — HomeNesty</title>
    <link rel="stylesheet" href="/src/index.css">
</head>
<body class="bg-slate-50">
    <div class="min-h-screen py-12 md:py-24">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-16 gap-8">
                <div>
                    <span class="text-xs font-bold uppercase tracking-[0.3em] text-luxury-gold mb-3 block font-sans">Executive Dashboard</span>
                    <h1 class="text-5xl font-serif tracking-tight text-primary-navy" id="welcome-msg">Welcome</h1>
                    <p class="text-slate-500 font-sans text-sm mt-2 font-light">Manage your global property portfolio and preferences</p>
                </div>
                <button id="open-modal-btn" class="hidden btn-luxury px-10 py-5">
                    Register Property
                </button>
            </div>

            <div id="listings-section" class="space-y-8">
                <div class="flex items-center justify-between border-b border-slate-200 pb-6">
                    <h2 class="text-2xl font-serif text-primary-navy" id="listings-title">Portfolio Listings</h2>
                </div>
                <div id="properties-list" class="grid grid-cols-1 gap-6">
                    <!-- Listings will be injected here -->
                </div>
            </div>

            <div id="bookings-section" class="mt-20 space-y-8">
                <div class="flex items-center justify-between border-b border-slate-200 pb-6">
                    <h2 class="text-2xl font-serif text-primary-navy">Incoming Requests</h2>
                </div>
                <div id="bookings-list" class="grid grid-cols-1 gap-6">
                    <!-- Bookings will be injected here -->
                </div>
            </div>

            <div id="favorites-section" class="mt-20 space-y-8">
                <div class="flex items-center justify-between border-b border-slate-200 pb-6">
                    <h2 class="text-2xl font-serif text-primary-navy">Saved Portfolio</h2>
                </div>
                <div id="favorites-list" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!-- Favorites will be injected here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="property-modal" class="hidden fixed inset-0 z-[60] bg-primary-navy/40 backdrop-blur-sm p-4 flex items-center justify-center">
        <div class="bg-white rounded-[2.5rem] w-full max-w-4xl max-h-[90vh] overflow-y-auto p-10 md:p-16 shadow-2xl relative border border-slate-100">
            <button id="close-modal-btn" class="absolute top-8 right-8 text-slate-400 hover:text-primary-navy p-2 transition-colors"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
            <div class="mb-12">
                <span class="text-xs font-bold uppercase tracking-[0.3em] text-luxury-gold mb-3 block">Property Registration</span>
                <h2 class="text-4xl font-serif tracking-tight text-primary-navy">Add New Sanctuary</h2>
            </div>
            <form id="property-form" class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 font-sans ml-1">Title</label>
                        <input type="text" id="p-title" required placeholder="Ex: Crystal Palace Penthouse" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-5 py-4 outline-none text-sm font-sans focus:ring-1 focus:ring-primary-navy transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 font-sans ml-1">Location</label>
                        <input type="text" id="p-location" required placeholder="Ex: Gulshan, Dhaka" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-5 py-4 outline-none text-sm font-sans focus:ring-1 focus:ring-primary-navy transition-all">
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 font-sans ml-1">Monthly Rent</label>
                            <input type="number" id="p-rent" required placeholder="৳" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-5 py-4 outline-none text-sm font-sans focus:ring-1 focus:ring-primary-navy transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 font-sans ml-1">Rooms</label>
                            <input type="number" id="p-rooms" required placeholder="Count" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-5 py-4 outline-none text-sm font-sans focus:ring-1 focus:ring-primary-navy transition-all">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 font-sans ml-1">Category</label>
                        <select id="p-category" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-5 py-4 outline-none text-sm font-sans focus:ring-1 focus:ring-primary-navy transition-all">
                            <option value="family">Family Estate</option>
                            <option value="student">Student Studio</option>
                            <option value="bachelor">Professional Suite (Jobholder)</option>
                            <option value="hotel">Vacation Hotel / Tips</option>
                        </select>
                    </div>
                </div>
                <div class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 font-sans ml-1">Description</label>
                        <textarea id="p-desc" required rows="5" placeholder="Elaborate on the property's features..." class="w-full bg-slate-50 border border-slate-100 rounded-xl px-5 py-4 outline-none text-sm font-sans resize-none focus:ring-1 focus:ring-primary-navy transition-all"></textarea>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 font-sans ml-1">Media URL</label>
                        <div class="flex gap-4">
                          <input type="url" id="p-image" placeholder="Image URL" class="flex-1 bg-slate-50 border border-slate-100 rounded-xl px-5 py-4 outline-none text-sm font-sans focus:ring-1 focus:ring-primary-navy transition-all">
                          <label class="cursor-pointer bg-slate-100 p-4 rounded-xl hover:bg-slate-200 transition-colors" title="Upload Local File">
                            <input type="file" id="p-image-file" class="hidden" accept="image/*">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                          </label>
                        </div>
                        <div id="image-preview" class="hidden mt-2 aspect-video rounded-xl bg-slate-100 overflow-hidden border border-slate-200">
                           <img src="" class="w-full h-full object-cover">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 font-sans ml-1">Legacy Coordinates</label>
                        <input type="url" id="p-map" placeholder="Google Maps Registry Link" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-5 py-4 outline-none text-sm font-sans focus:ring-1 focus:ring-primary-navy transition-all">
                    </div>
                </div>
                <button type="submit" id="p-submit" class="md:col-span-2 btn-luxury py-5 rounded-[1.25rem] mt-4">Publish to Registry</button>
            </form>
        </div>
    </div>

    <script type="module" src="/src/dashboard.js"></script>
</body>
</html>
